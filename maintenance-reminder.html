<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HVAC Maintenance Reminder — Comfortable HVAC Services</title>
  <meta name="description" content="Free HVAC maintenance reminder. Get a personalized maintenance schedule for your system.">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      overflow-x: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #f5f5f5;
      color: #111;
      font-size: 14px;
      line-height: 1.5;
    }

    .tool-head {
      background: #1c3a5a;
      color: #fff;
      padding: 0.75rem 1.1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .tool-head svg { flex-shrink: 0; opacity: 0.9; }
    .tool-head-text h2 { font-size: 0.9rem; font-weight: 700; }
    .tool-head-text p { font-size: 0.71rem; opacity: 0.7; margin-top: 0.05rem; }

    .body { padding: 1rem 1.1rem; background: #fff; }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.6rem;
      margin-bottom: 0.6rem;
    }
    .field { display: flex; flex-direction: column; gap: 0.2rem; }
    .field.full { grid-column: 1 / -1; }

    label {
      font-size: 0.68rem;
      font-weight: 700;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    input, select {
      padding: 0.42rem 0.55rem;
      border: 1px solid #ccc;
      font-size: 0.85rem;
      color: #111;
      background: #fff;
      width: 100%;
      appearance: auto;
      transition: border-color 0.12s;
    }
    input:focus, select:focus { outline: none; border-color: #1c3a5a; }

    .calc-btn {
      width: 100%;
      background: #c04800;
      color: #fff;
      border: none;
      padding: 0.6rem;
      font-size: 0.88rem;
      font-weight: 700;
      cursor: pointer;
      margin-bottom: 0.75rem;
      transition: background 0.15s;
    }
    .calc-btn:hover { background: #9e3a00; }

    /* Schedule */
    .result { display: none; }
    .result.show { display: block; }

    .sched-heading {
      font-size: 0.68rem;
      font-weight: 700;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 0.45rem;
    }

    .sched-list { list-style: none; }

    .sched-item {
      display: flex;
      align-items: flex-start;
      gap: 0;
      margin-bottom: 3px;
      border: 1px solid #d8d8d8;
      background: #fafafa;
    }

    .sched-status-bar {
      width: 4px;
      align-self: stretch;
      flex-shrink: 0;
    }
    .overdue .sched-status-bar { background: #9b1a1a; }
    .soon    .sched-status-bar { background: #9a6500; }
    .ok      .sched-status-bar { background: #1a5430; }

    .sched-content {
      padding: 0.5rem 0.7rem;
      flex: 1;
      min-width: 0;
    }
    .sched-task { font-size: 0.82rem; font-weight: 600; color: #111; }
    .sched-date { font-size: 0.7rem; color: #666; margin-top: 0.05rem; }
    .overdue .sched-date { color: #9b1a1a; }
    .soon    .sched-date { color: #7a5000; }

    .sched-badge {
      align-self: center;
      flex-shrink: 0;
      margin-right: 0.6rem;
      font-size: 0.6rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 0.15rem 0.4rem;
      border: 1px solid;
    }
    .overdue .sched-badge { color: #9b1a1a; border-color: #9b1a1a; }
    .soon    .sched-badge { color: #7a5000; border-color: #9a6500; }
    .ok      .sched-badge { color: #1a5430; border-color: #1a5430; }

    .print-btn {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      justify-content: center;
      width: 100%;
      background: #fff;
      color: #1c3a5a;
      border: 1px solid #1c3a5a;
      padding: 0.48rem;
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 0.65rem;
      transition: all 0.15s;
    }
    .print-btn:hover { background: #1c3a5a; color: #fff; }
    .print-btn svg { flex-shrink: 0; }

    .tool-foot {
      padding: 0.55rem 1.1rem;
      background: #f5f5f5;
      border-top: 1px solid #ddd;
      font-size: 0.67rem;
      color: #777;
      text-align: center;
    }
    .tool-foot a { color: #1c3a5a; text-decoration: none; font-weight: 600; }
    .tool-foot a:hover { text-decoration: underline; }

    @media print {
      .calc-btn, .print-btn, .tool-foot { display: none; }
      .tool-head { color: #000; background: none; border-bottom: 2px solid #000; }
    }

    @media (max-width: 360px) {
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div class="tool-head">
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
  <div class="tool-head-text">
    <h2>HVAC Maintenance Reminder</h2>
    <p>Generate a personalized maintenance schedule</p>
  </div>
</div>

<div class="body">
  <div class="grid">
    <div class="field full">
      <label>System Type</label>
      <select id="system">
        <option value="central">Central AC + Furnace</option>
        <option value="heatpump">Heat Pump</option>
        <option value="minisplit">Mini-Split System</option>
        <option value="boiler">Boiler / Radiator System</option>
      </select>
    </div>
    <div class="field full">
      <label>Filter Type</label>
      <select id="filter-type">
        <option value="30">1" Fiberglass — change every 30 days</option>
        <option value="60">1" Pleated — change every 60 days</option>
        <option value="90" selected>1" Premium Pleated — change every 90 days</option>
        <option value="180">4" Media Filter — change every 6 months</option>
        <option value="365">5" HEPA / Whole-house — change yearly</option>
      </select>
    </div>
    <div class="field">
      <label>Last Filter Change</label>
      <input type="date" id="last-filter">
    </div>
    <div class="field">
      <label>Last Annual Tune-Up</label>
      <input type="date" id="last-tuneup">
    </div>
  </div>

  <button class="calc-btn" onclick="generate()">Generate Schedule</button>

  <div class="result" id="result">
    <div class="sched-heading">Upcoming maintenance</div>
    <ul class="sched-list" id="sched-list"></ul>
    <button class="print-btn" onclick="window.print()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
      Print schedule
    </button>
  </div>
</div>

<div class="tool-foot">
  Provided by <a href="https://comfortablehvacservices.com" target="_blank" rel="noopener">Comfortable HVAC Services</a>
  &nbsp;&middot;&nbsp;
  <a href="https://jarrencampos.github.io" target="_blank">More free HVAC tools</a>
</div>

<script>
  const today = new Date();
  const iso = d => d.toISOString().split('T')[0];
  const shiftDays = (d, n) => { const x = new Date(d); x.setDate(x.getDate() + n); return x; };

  document.getElementById('last-filter').value = iso(shiftDays(today, -55));
  document.getElementById('last-tuneup').value = iso(shiftDays(today, -310));

  function addDays(d, n) { const x = new Date(d); x.setDate(x.getDate() + n); return x; }
  function addMonths(d, n) { const x = new Date(d); x.setMonth(x.getMonth() + n); return x; }
  function diffDays(a, b) { return Math.round((b - a) / 86400000); }

  function fmtDate(d) {
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  }

  function getStatus(due) {
    const diff = diffDays(today, due);
    if (diff < 0)   return { cls: 'overdue', badge: 'Overdue',  sub: Math.abs(diff) + 'd overdue' };
    if (diff <= 30) return { cls: 'soon',    badge: 'Due soon', sub: 'Due in ' + diff + ' days' };
    return               { cls: 'ok',      badge: 'Upcoming', sub: 'Due in ' + diff + ' days' };
  }

  function nextMonth(m) {
    const d = new Date(today.getFullYear(), m, 1);
    if (today >= d) d.setFullYear(d.getFullYear() + 1);
    return d;
  }

  function generate() {
    const filterVal = document.getElementById('last-filter').value;
    if (!filterVal) { alert('Please enter your last filter change date.'); return; }

    const lastFilter = new Date(filterVal);
    const lastTuneup = new Date(document.getElementById('last-tuneup').value || iso(shiftDays(today, -365)));
    const filterDays = parseInt(document.getElementById('filter-type').value);
    const sys = document.getElementById('system').value;

    const tasks = [
      {
        task: 'Air Filter Replacement',
        due: addDays(lastFilter, filterDays),
      },
      {
        task: sys === 'boiler' ? 'Annual Boiler Tune-Up'
            : sys === 'heatpump' ? 'Annual Heat Pump Service'
            : sys === 'minisplit' ? 'Annual Mini-Split Service'
            : 'Annual HVAC Tune-Up',
        due: addMonths(lastTuneup, 12),
      },
      {
        task: sys === 'boiler' ? 'Expansion Tank Flush & Bleed Radiators' : 'Coil & Condensate Drain Cleaning',
        due: addMonths(lastTuneup, 12),
      },
      { task: 'Spring AC / Cooling Startup Check', due: nextMonth(2) },
      { task: 'Fall Heating System Preparation', due: nextMonth(8) },
      { task: 'Thermostat Battery Replacement', due: nextMonth(10) },
      { task: 'Clear & Inspect Outdoor Unit', due: nextMonth(3) },
    ];

    tasks.sort((a, b) => a.due - b.due);

    document.getElementById('sched-list').innerHTML = tasks.map(t => {
      const s = getStatus(t.due);
      return `<li class="sched-item ${s.cls}">
        <div class="sched-status-bar"></div>
        <div class="sched-content">
          <div class="sched-task">${t.task}</div>
          <div class="sched-date">${fmtDate(t.due)} &middot; ${s.sub}</div>
        </div>
        <span class="sched-badge">${s.badge}</span>
      </li>`;
    }).join('');

    document.getElementById('result').classList.add('show');
  }
</script>
</body>
</html>
