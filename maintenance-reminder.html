<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HVAC Maintenance Reminder — Comfortable HVAC Services</title>
  <meta name="description" content="Free HVAC maintenance reminder. Get a personalized maintenance schedule for your system.">
  <script>
    (function() {
      var p = new URLSearchParams(location.search);
      var r = document.documentElement;
      var ok = function(v) { return /^[0-9a-fA-F]{3,6}$/.test(v || '') ? '#' + v : null; };
      var pri = ok(p.get('primary')), acc = ok(p.get('accent'));
      if (pri) r.style.setProperty('--primary', pri);
      if (acc) r.style.setProperty('--accent', acc);
    })();
  </script>
  <style>
    :root { --primary: #1c3a5a; --accent: #c04800; }
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      overflow-x: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #f5f5f5;
      color: #111;
      font-size: 14px;
      line-height: 1.5;
    }

    .tool-head {
      background: var(--primary);
      color: #fff;
      padding: 0.75rem 1.1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .tool-head svg { flex-shrink: 0; opacity: 0.9; }
    .tool-head-text h2 { font-size: 0.9rem; font-weight: 700; }
    .tool-head-text p { font-size: 0.71rem; opacity: 0.7; margin-top: 0.05rem; }

    .body { padding: 1rem 1.1rem; background: #fff; }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.6rem;
      margin-bottom: 0.6rem;
    }
    .field { display: flex; flex-direction: column; gap: 0.2rem; }
    .field.full { grid-column: 1 / -1; }

    label {
      font-size: 0.68rem;
      font-weight: 700;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    input, select {
      padding: 0.42rem 0.55rem;
      border: 1px solid #ccc;
      font-size: 0.85rem;
      color: #111;
      background: #fff;
      width: 100%;
      appearance: auto;
      transition: border-color 0.12s;
    }
    input:focus, select:focus { outline: none; border-color: var(--primary); }

    .calc-btn {
      width: 100%;
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 0.6rem;
      font-size: 0.88rem;
      font-weight: 700;
      cursor: pointer;
      margin-bottom: 0.75rem;
      transition: filter 0.15s;
    }
    .calc-btn:hover { filter: brightness(0.82); }

    .result { display: none; }
    .result.show { display: block; }

    .sched-heading {
      font-size: 0.68rem;
      font-weight: 700;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 0.45rem;
    }

    .sched-list { list-style: none; }

    .sched-item {
      display: flex;
      align-items: flex-start;
      margin-bottom: 3px;
      border: 1px solid #d8d8d8;
      background: #fafafa;
    }

    .sched-status-bar { width: 4px; align-self: stretch; flex-shrink: 0; }
    /* status colors are semantic — intentionally not themeable */
    .overdue .sched-status-bar { background: #9b1a1a; }
    .soon    .sched-status-bar { background: #9a6500; }
    .ok      .sched-status-bar { background: #1a5430; }

    .sched-content { padding: 0.5rem 0.7rem; flex: 1; min-width: 0; }
    .sched-task { font-size: 0.82rem; font-weight: 600; color: #111; }
    .sched-date { font-size: 0.7rem; color: #666; margin-top: 0.05rem; }
    .overdue .sched-date { color: #9b1a1a; }
    .soon    .sched-date { color: #7a5000; }

    .sched-badge {
      align-self: center;
      flex-shrink: 0;
      margin-right: 0.6rem;
      font-size: 0.6rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 0.15rem 0.4rem;
      border: 1px solid;
    }
    .overdue .sched-badge { color: #9b1a1a; border-color: #9b1a1a; }
    .soon    .sched-badge { color: #7a5000; border-color: #9a6500; }
    .ok      .sched-badge { color: #1a5430; border-color: #1a5430; }

    .result-actions {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 0.4rem;
      margin-top: 0.65rem;
    }
    .result-actions button, .result-actions a {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      justify-content: center;
      background: #fff;
      color: var(--primary);
      border: 1px solid var(--primary);
      padding: 0.45rem 0.4rem;
      font-size: 0.73rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .result-actions button:hover,
    .result-actions a:hover { background: var(--primary); color: #fff; }
    .result-actions svg { flex-shrink: 0; }

    .gcal-list {
      display: none;
      margin-top: 0.4rem;
      border: 1px solid #d8d8d8;
      background: #fafafa;
    }
    .gcal-list-head {
      padding: 0.35rem 0.7rem;
      background: #f0f0f0;
      border-bottom: 1px solid #d8d8d8;
      font-size: 0.67rem;
      font-weight: 700;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .gcal-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
      padding: 0.38rem 0.7rem;
      border-bottom: 1px solid #ebebeb;
      font-size: 0.75rem;
    }
    .gcal-item:last-child { border-bottom: none; }
    .gcal-task { color: #222; flex: 1; min-width: 0; }
    .gcal-date { color: #777; font-size: 0.69rem; white-space: nowrap; }
    .gcal-add {
      color: var(--primary);
      text-decoration: none;
      font-weight: 700;
      font-size: 0.7rem;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .gcal-add:hover { text-decoration: underline; }

    .tool-foot {
      padding: 0.55rem 1.1rem;
      background: #f5f5f5;
      border-top: 1px solid #ddd;
      font-size: 0.67rem;
      color: #777;
      text-align: center;
    }
    .tool-foot a { color: var(--primary); text-decoration: none; font-weight: 600; }
    .tool-foot a:hover { text-decoration: underline; }

    @media print {
      .calc-btn, .print-btn, .tool-foot { display: none; }
      .tool-head { color: #000; background: none; border-bottom: 2px solid #000; }
    }

    @media (max-width: 360px) { .grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

<div class="tool-head">
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
  <div class="tool-head-text">
    <h2>HVAC Maintenance Reminder</h2>
    <p>Generate a personalized maintenance schedule</p>
  </div>
</div>

<div class="body">
  <div class="grid">
    <div class="field full">
      <label>System Type</label>
      <select id="system">
        <option value="central">Central AC + Furnace</option>
        <option value="heatpump">Heat Pump</option>
        <option value="minisplit">Mini-Split System</option>
        <option value="boiler">Boiler / Radiator System</option>
      </select>
    </div>
    <div class="field full">
      <label>Filter Type</label>
      <select id="filter-type">
        <option value="30">1" Fiberglass — change every 30 days</option>
        <option value="60">1" Pleated — change every 60 days</option>
        <option value="90" selected>1" Premium Pleated — change every 90 days</option>
        <option value="180">4" Media Filter — change every 6 months</option>
        <option value="365">5" HEPA / Whole-house — change yearly</option>
      </select>
    </div>
    <div class="field">
      <label>Last Filter Change</label>
      <input type="date" id="last-filter">
    </div>
    <div class="field">
      <label>Last Annual Tune-Up</label>
      <input type="date" id="last-tuneup">
    </div>
  </div>

  <button class="calc-btn" onclick="generate()">Generate Schedule</button>

  <div class="result" id="result">
    <div class="sched-heading">Upcoming maintenance</div>
    <ul class="sched-list" id="sched-list"></ul>
    <div class="result-actions">
      <button onclick="downloadICS()">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        Apple / Outlook
      </button>
      <button id="gcal-btn" onclick="toggleGcal()">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15,3 21,3 21,9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        Google Calendar
      </button>
      <button onclick="window.print()">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
        Print
      </button>
    </div>
    <div class="gcal-list" id="gcal-list">
      <div class="gcal-list-head">Add individual events to Google Calendar</div>
      <div id="gcal-items"></div>
    </div>
  </div>
</div>

<div class="tool-foot">
  Provided by <a href="https://comfortablehvacservices.com" target="_blank" rel="noopener">Comfortable HVAC Services</a>
  &nbsp;&middot;&nbsp;
  <a href="https://jarrencampos.github.io" target="_blank">More free HVAC tools</a>
</div>

<script>
  var today = new Date();
  var iso = function(d) { return d.toISOString().split('T')[0]; };
  var shiftDays = function(d, n) { var x = new Date(d); x.setDate(x.getDate() + n); return x; };

  document.getElementById('last-filter').value = iso(shiftDays(today, -55));
  document.getElementById('last-tuneup').value = iso(shiftDays(today, -310));

  function addDays(d, n) { var x = new Date(d); x.setDate(x.getDate() + n); return x; }
  function addMonths(d, n) { var x = new Date(d); x.setMonth(x.getMonth() + n); return x; }
  function diffDays(a, b) { return Math.round((b - a) / 86400000); }
  function fmtDate(d) { return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }); }

  function getStatus(due) {
    var diff = diffDays(today, due);
    if (diff < 0)   return { cls: 'overdue', badge: 'Overdue',  sub: Math.abs(diff) + 'd overdue' };
    if (diff <= 30) return { cls: 'soon',    badge: 'Due soon', sub: 'Due in ' + diff + ' days' };
    return               { cls: 'ok',      badge: 'Upcoming', sub: 'Due in ' + diff + ' days' };
  }

  function nextMonth(m) {
    var d = new Date(today.getFullYear(), m, 1);
    if (today >= d) d.setFullYear(d.getFullYear() + 1);
    return d;
  }

  function generate() {
    var filterVal = document.getElementById('last-filter').value;
    if (!filterVal) { alert('Please enter your last filter change date.'); return; }

    var lastFilter = new Date(filterVal);
    var lastTuneup = new Date(document.getElementById('last-tuneup').value || iso(shiftDays(today, -365)));
    var filterDays = parseInt(document.getElementById('filter-type').value);
    var sys = document.getElementById('system').value;

    var tasks = [
      { task: 'Air Filter Replacement', due: addDays(lastFilter, filterDays) },
      {
        task: sys === 'boiler' ? 'Annual Boiler Tune-Up'
            : sys === 'heatpump' ? 'Annual Heat Pump Service'
            : sys === 'minisplit' ? 'Annual Mini-Split Service'
            : 'Annual HVAC Tune-Up',
        due: addMonths(lastTuneup, 12),
      },
      {
        task: sys === 'boiler' ? 'Expansion Tank Flush & Bleed Radiators' : 'Coil & Condensate Drain Cleaning',
        due: addMonths(lastTuneup, 12),
      },
      { task: 'Spring AC / Cooling Startup Check', due: nextMonth(2) },
      { task: 'Fall Heating System Preparation',   due: nextMonth(8) },
      { task: 'Thermostat Battery Replacement',    due: nextMonth(10) },
      { task: 'Clear & Inspect Outdoor Unit',      due: nextMonth(3) },
    ];

    tasks.sort(function(a, b) { return a.due - b.due; });

    document.getElementById('sched-list').innerHTML = tasks.map(function(t) {
      var s = getStatus(t.due);
      return '<li class="sched-item ' + s.cls + '">'
        + '<div class="sched-status-bar"></div>'
        + '<div class="sched-content">'
        + '<div class="sched-task">' + t.task + '</div>'
        + '<div class="sched-date">' + fmtDate(t.due) + ' &middot; ' + s.sub + '</div>'
        + '</div>'
        + '<span class="sched-badge">' + s.badge + '</span>'
        + '</li>';
    }).join('');

    document.getElementById('result').classList.add('show');

    // Store tasks for calendar export; reset gcal panel
    scheduledTasks = tasks;
    document.getElementById('gcal-list').style.display = 'none';
    document.getElementById('gcal-btn').dataset.open = '';
  }

  // ── Calendar export ──────────────────────────────────────────────

  var scheduledTasks = [];

  function icsDate(d) {
    var y = d.getFullYear();
    var m = ('0' + (d.getMonth() + 1)).slice(-2);
    var day = ('0' + d.getDate()).slice(-2);
    return '' + y + m + day;
  }

  function buildICS() {
    var lines = [
      'BEGIN:VCALENDAR',
      'VERSION:2.0',
      'PRODID:-//Comfortable HVAC Services//HVAC Maintenance Reminder//EN',
      'CALSCALE:GREGORIAN',
      'METHOD:PUBLISH',
    ];
    scheduledTasks.forEach(function(t) {
      var ds = icsDate(t.due);
      var de = icsDate(addDays(t.due, 1));
      lines = lines.concat([
        'BEGIN:VEVENT',
        'DTSTART;VALUE=DATE:' + ds,
        'DTEND;VALUE=DATE:' + de,
        'SUMMARY:' + t.task,
        'DESCRIPTION:HVAC maintenance reminder — comfortablehvacservices.com',
        'UID:' + ds + t.task.replace(/\W/g, '') + '@hvactools',
        'BEGIN:VALARM',
        'TRIGGER:-P7D',
        'ACTION:DISPLAY',
        'DESCRIPTION:Reminder: ' + t.task,
        'END:VALARM',
        'END:VEVENT',
      ]);
    });
    lines.push('END:VCALENDAR');
    return lines.join('\r\n');
  }

  function downloadICS() {
    if (!scheduledTasks.length) return;
    var content = buildICS();
    var isIOS = /iP(ad|hone|od)/.test(navigator.userAgent);
    if (isIOS) {
      // iOS opens data URLs in Calendar app directly
      window.open('data:text/calendar;charset=utf-8,' + encodeURIComponent(content), '_blank');
    } else {
      var blob = new Blob([content], { type: 'text/calendar;charset=utf-8' });
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url;
      a.download = 'hvac-maintenance.ics';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(function() { URL.revokeObjectURL(url); }, 500);
    }
  }

  function toggleGcal() {
    var list = document.getElementById('gcal-list');
    var btn = document.getElementById('gcal-btn');
    var open = btn.dataset.open === '1';
    if (!open) {
      document.getElementById('gcal-items').innerHTML = scheduledTasks.map(function(t) {
        var params = 'action=TEMPLATE'
          + '&text=' + encodeURIComponent(t.task)
          + '&dates=' + icsDate(t.due) + '/' + icsDate(addDays(t.due, 1))
          + '&details=' + encodeURIComponent('HVAC maintenance reminder — comfortablehvacservices.com');
        return '<div class="gcal-item">'
          + '<span class="gcal-task">' + t.task + '</span>'
          + '<span class="gcal-date">' + fmtDate(t.due) + '</span>'
          + '<a class="gcal-add" href="https://calendar.google.com/calendar/render?' + params + '" target="_blank" rel="noopener">+ Add</a>'
          + '</div>';
      }).join('');
      list.style.display = 'block';
      btn.dataset.open = '1';
    } else {
      list.style.display = 'none';
      btn.dataset.open = '';
    }
  }

  window.addEventListener('message', function(e) {
    if (!e.data || e.data.type !== 'hvac-colors') return;
    var r = document.documentElement;
    var ok = function(v) { return /^[0-9a-fA-F]{3,6}$/.test(v || '') ? '#' + v : null; };
    var pri = ok(e.data.primary), acc = ok(e.data.accent);
    if (pri) r.style.setProperty('--primary', pri);
    if (acc) r.style.setProperty('--accent', acc);
  });
</script>
</body>
</html>
